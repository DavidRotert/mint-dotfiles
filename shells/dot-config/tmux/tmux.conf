set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-shell /bin/zsh
set -g history-limit 50000

# set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# unset Ctrl+d terminal keybind (prevent accidentialy exiting session)
bind -n C-d detach

# set index from 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# set mode colors
set -g mode-style bg=colour248,fg=black
set -g message-style bg=colour111,fg=black

# customize status bar
set -g status-position bottom
set -g status-bg colour235
set -g status-fg colour255

## left bar style (session)
set -g status-left-length 60
set -g status-left '#[bg=colour141,fg=colour0,nobold]   #S #[bg=colour235,fg=colour255,nobold] '

#set -g status-right-length 60
set -g status-right '#[fg=black,bg=colour168,nobold]   #H '

set -g window-status-separator ""
## active window style
set-window-option -g window-status-current-format '#[bg=colour71,fg=colour0,nobold]  #I:#W '
## inactive window style
set-window-option -g window-status-format '#[bg=colour108,fg=colour0,nobold]  #I:#W '

## set active border style color
set -g pane-active-border-style fg=colour71

# set additional keybindings
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded Tmux configuration"
bind C-p select-pane -P 'bg=colour52'

# set mouse options
set -g mouse on
set -g set-clipboard
unbind -n MouseDown3Pane
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"
